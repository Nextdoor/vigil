name: Helm Chart Validation

on:
  pull_request:
    paths:
      - 'charts/vigil-controller/**'
  push:
    branches:
      - main
    paths:
      - 'charts/vigil-controller/**'

jobs:
  validate:
    name: Validate Helm Chart
    runs-on: runs-on=${{ github.run_id }}/runner=2cpu-linux-x64/cache=/var/cache/magic/extras=magic-cache

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Helm
        uses: azure/setup-helm@dda3372f752e03dde6b3237bc9431cdc2f7a02a2 # v5
        with:
          version: v3.16.3

      - name: Helm Lint
        run: |
          helm lint charts/vigil-controller

      - name: Build chart dependencies
        run: |
          helm dependency update charts/vigil-controller

      - name: Install helm-docs
        run: |
          cd /tmp
          curl -LO https://github.com/norwoodj/helm-docs/releases/download/v1.14.2/helm-docs_1.14.2_Linux_x86_64.tar.gz
          tar -xzf helm-docs_1.14.2_Linux_x86_64.tar.gz
          sudo mv helm-docs /usr/local/bin/

      - name: Check Helm documentation
        run: |
          make helm-docs-check

      - name: Create Kind cluster
        uses: helm/kind-action@ef37e7f390d99f746eb8b610417061a60e82a6cc # v1
        with:
          version: v0.26.0
          kubectl_version: v1.31.0

      - name: Install chart
        run: |
          helm install vigil-test charts/vigil-controller \
            --namespace vigil-system \
            --create-namespace \
            --values charts/vigil-controller/ci/ci-values.yaml \
            --wait \
            --timeout 5m

      - name: Verify deployment
        run: |
          kubectl get pods -n vigil-system
          kubectl get deployment -n vigil-system
          kubectl rollout status deployment/vigil-test-vigil-controller-controller-manager -n vigil-system --timeout=5m

      - name: Check service endpoints
        run: |
          kubectl get svc -n vigil-system
          kubectl get endpoints -n vigil-system

      - name: Get pod logs
        if: failure()
        run: |
          kubectl logs -n vigil-system -l app.kubernetes.io/name=vigil-controller --tail=100

      - name: Uninstall chart
        if: always()
        run: |
          helm uninstall vigil-test -n vigil-system || true
