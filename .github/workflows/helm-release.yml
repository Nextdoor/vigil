name: Helm Chart Release

on:
  workflow_call:
    inputs:
      version:
        description: 'Release version (without v prefix, e.g., 1.2.3)'
        required: true
        type: string
      image-tag:
        description: 'Docker image tag to reference in the chart'
        required: true
        type: string

env:
  HELM_REPO_URL: https://oss.nextdoor.com/vigil-controller

jobs:
  release:
    name: Release Helm Chart
    runs-on: runs-on=${{ github.run_id }}/runner=2cpu-linux-x64/cache=/var/cache/magic/extras=magic-cache
    permissions:
      contents: write
      packages: write
      pages: write
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Set up Helm
        uses: azure/setup-helm@dda3372f752e03dde6b3237bc9431cdc2f7a02a2 # v5
        with:
          version: v3.16.3

      - name: Update Chart.yaml version and appVersion
        run: |
          VERSION="${{ inputs.version }}"
          sed -i "s/^version:.*/version: ${VERSION}/" charts/vigil-controller/Chart.yaml
          sed -i "s/^appVersion:.*/appVersion: \"${VERSION}\"/" charts/vigil-controller/Chart.yaml
          echo "Updated Chart.yaml:"
          cat charts/vigil-controller/Chart.yaml

      - name: Install helm-docs
        run: |
          cd /tmp
          wget https://github.com/norwoodj/helm-docs/releases/download/v1.14.2/helm-docs_1.14.2_Linux_x86_64.tar.gz
          tar -xzf helm-docs_1.14.2_Linux_x86_64.tar.gz
          sudo mv helm-docs /usr/local/bin/
          helm-docs --version

      - name: Update chart documentation
        run: |
          cd charts/vigil-controller
          helm-docs

      - name: Update Helm dependencies
        run: |
          cd charts/vigil-controller
          helm dependency update

      - name: Configure Git
        run: |
          git config user.name "$GITHUB_ACTOR"
          git config user.email "$GITHUB_ACTOR@users.noreply.github.com"

      - name: Publish Helm chart to GitHub Pages
        uses: helm/chart-releaser-action@cae68fefc6b5f367a0275617c9f83181ba54714f # v1.7.0
        with:
          charts_dir: charts
          packages_with_index: true
        env:
          CR_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create GitHub release artifacts
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe # v2
        with:
          tag_name: v${{ inputs.version }}
          files: |
            .cr-release-packages/*.tgz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
