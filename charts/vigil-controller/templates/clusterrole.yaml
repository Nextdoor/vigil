{{- if .Values.rbac.create -}}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "vigil-controller.fullname" . }}-manager-role
  labels:
    {{- include "vigil-controller.labels" . | nindent 4 }}
rules:
# Node access: watch, list, get, and patch (for taint removal)
- apiGroups:
  - ""
  resources:
  - nodes
  verbs:
  - get
  - list
  - watch
  - patch
  - update
# DaemonSet access: list and watch for discovery
- apiGroups:
  - apps
  resources:
  - daemonsets
  verbs:
  - get
  - list
  - watch
# Pod access: watch for readiness checking
- apiGroups:
  - ""
  resources:
  - pods
  verbs:
  - get
  - list
  - watch
# Events: emit events on nodes
- apiGroups:
  - ""
  resources:
  - events
  verbs:
  - create
  - patch
{{- end }}
